services:
  postgres:
    # GIS real (docs/96 item #8, docs/113): la migracion 0068_gis_geometry_column
    # ejecuta "CREATE EXTENSION IF NOT EXISTS postgis" contra este servicio.
    # La imagen plana postgres:16 no trae PostGIS -- para que esa migracion
    # tenga exito en produccion, cambiar a una imagen con la extension
    # preinstalada, por ejemplo postgis/postgis:16-3.4, o instalar el paquete
    # postgresql-16-postgis-3 en una imagen derivada.
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: infomatt360
      POSTGRES_USER: infomatt360
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?configure_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infomatt360 -d infomatt360"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@postgres:5432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker-bulk:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@postgres:5432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    command: ["python", "-m", "app.cli.process_bulk_jobs", "--limit", "50", "--loop", "--sleep-seconds", "5", "--worker-id", "worker-bulk-01"]

  worker-scheduler:
    # Sin este worker, ScheduledTask (respaldos recurrentes, docs/78, y el
    # sondeo IMAP de la bandeja externa, docs/116) solo queda guardado en la
    # base de datos pero nadie lo ejecuta -- ver run_scheduled_tasks.py.
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@postgres:5432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    command: ["python", "-m", "app.cli.run_scheduled_tasks", "--limit", "50", "--loop", "--sleep-seconds", "60"]

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
