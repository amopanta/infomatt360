services:
  postgres:
    # GIS real (docs/96 item #8, docs/113): la migracion 0068_gis_geometry_column
    # ejecuta "CREATE EXTENSION IF NOT EXISTS postgis" contra este servicio.
    # La imagen plana postgres:16 no trae PostGIS -- para que esa migracion
    # tenga exito en produccion, cambiar a una imagen con la extension
    # preinstalada, por ejemplo postgis/postgis:16-3.4, o instalar el paquete
    # postgresql-16-postgis-3 en una imagen derivada.
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: infomatt360
      POSTGRES_USER: infomatt360
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?configure_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infomatt360 -d infomatt360"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # E-003 (auditoria tecnica externa julio 2026, docs/120): pool de conexiones
  # entre el backend y Postgres. Cada replica del backend ya trae su propio
  # pool de SQLAlchemy (DB_POOL_SIZE + DB_MAX_OVERFLOW); sin PgBouncer, el
  # total de conexiones reales a Postgres crece linealmente con el numero de
  # replicas y puede agotar max_connections mucho antes de que Postgres se
  # quede sin capacidad real. PgBouncer multiplexa muchas conexiones de
  # cliente sobre un numero mucho menor de conexiones reales a Postgres.
  # pool_mode=transaction (el mas eficiente) es seguro aqui: este proyecto no
  # usa advisory locks, LISTEN/NOTIFY ni prepared statements de sesion
  # (verificado, ver docs/120). No publica puerto al host -- solo lo
  # consumen los servicios internos de este mismo compose.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://infomatt360:${POSTGRES_PASSWORD}@postgres:5432/infomatt360
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      LISTEN_PORT: "6432"
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "20"
      ADMIN_USERS: infomatt360
    depends_on:
      postgres:
        condition: service_healthy

  # E-001 (auditoria tecnica externa julio 2026, docs/117): 2 replicas del
  # backend en vez de una sola instancia, mas backend-lb (nginx) haciendo
  # balanceo de carga real -- sin esto, un solo proceso backend era un punto
  # unico de falla y el techo de throughput real de toda la aplicacion.
  # Ninguna publica puerto al host directamente; solo backend-lb (mas abajo)
  # se expone en el 8000 que antes usaba el servicio backend.
  backend-1:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@pgbouncer:6432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-2:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@pgbouncer:6432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-lb:
    # IP fija (ver "networks" al final del archivo) para que el backend
    # pueda distinguir su trafico real via API_RATE_LIMIT_TRUSTED_PROXY_IPS
    # (ver .env.production.example) -- sin esto, el rate limiting y el
    # throttle de login verian a todos los clientes como si vinieran de
    # backend-lb, en vez de su IP real.
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    volumes:
      - ./deploy/nginx.backend-lb.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      default:
        ipv4_address: 172.28.0.10
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker-bulk:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@pgbouncer:6432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    command: ["python", "-m", "app.cli.process_bulk_jobs", "--limit", "50", "--loop", "--sleep-seconds", "5", "--worker-id", "worker-bulk-01"]

  worker-scheduler:
    # Sin este worker, ScheduledTask (respaldos recurrentes, docs/78, y el
    # sondeo IMAP de la bandeja externa, docs/116) solo queda guardado en la
    # base de datos pero nadie lo ejecuta -- ver run_scheduled_tasks.py.
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@pgbouncer:6432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    command: ["python", "-m", "app.cli.run_scheduled_tasks", "--limit", "50", "--loop", "--sleep-seconds", "60"]

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      backend-lb:
        condition: service_healthy
    ports:
      - "8080:80"

  prometheus:
    # Stack de observabilidad (auditoria tecnica externa julio 2026, docs/118).
    # Scrapea backend-1/backend-2 directo, nunca a traves de backend-lb (ver
    # deploy/prometheus.yml). Requiere secrets/metrics_token creado antes del
    # primer "up" -- correr "python -m app.cli.generate_metrics_token" contra
    # backend-1/backend-2 ya arriba y guardar la salida ahi (docs/61).
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./secrets/metrics_token:/run/secrets/metrics_token:ro
      - prometheus_data:/prometheus
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy

  grafana:
    # Sin autenticacion propia, Prometheus no se expone al host (arriba); se
    # consulta a traves de Grafana, que si tiene login. Datasource y
    # dashboard inicial provistos en deploy/grafana/provisioning/.
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?configure_GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
