services:
  postgres:
    # GIS real (docs/96 item #8, docs/113): la migracion 0068_gis_geometry_column
    # ejecuta "CREATE EXTENSION IF NOT EXISTS postgis" contra este servicio.
    # La imagen plana postgres:16 no trae PostGIS -- para que esa migracion
    # tenga exito en produccion, cambiar a una imagen con la extension
    # preinstalada, por ejemplo postgis/postgis:16-3.4, o instalar el paquete
    # postgresql-16-postgis-3 en una imagen derivada.
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: infomatt360
      POSTGRES_USER: infomatt360
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?configure_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infomatt360 -d infomatt360"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # E-001 (auditoria tecnica externa julio 2026, docs/117): 2 replicas del
  # backend en vez de una sola instancia, mas backend-lb (nginx) haciendo
  # balanceo de carga real -- sin esto, un solo proceso backend era un punto
  # unico de falla y el techo de throughput real de toda la aplicacion.
  # Ninguna publica puerto al host directamente; solo backend-lb (mas abajo)
  # se expone en el 8000 que antes usaba el servicio backend.
  backend-1:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@postgres:5432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-2:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@postgres:5432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-lb:
    # IP fija (ver "networks" al final del archivo) para que el backend
    # pueda distinguir su trafico real via API_RATE_LIMIT_TRUSTED_PROXY_IPS
    # (ver .env.production.example) -- sin esto, el rate limiting y el
    # throttle de login verian a todos los clientes como si vinieran de
    # backend-lb, en vez de su IP real.
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    volumes:
      - ./deploy/nginx.backend-lb.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      default:
        ipv4_address: 172.28.0.10
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker-bulk:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@postgres:5432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    command: ["python", "-m", "app.cli.process_bulk_jobs", "--limit", "50", "--loop", "--sleep-seconds", "5", "--worker-id", "worker-bulk-01"]

  worker-scheduler:
    # Sin este worker, ScheduledTask (respaldos recurrentes, docs/78, y el
    # sondeo IMAP de la bandeja externa, docs/116) solo queda guardado en la
    # base de datos pero nadie lo ejecuta -- ver run_scheduled_tasks.py.
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://infomatt360:${POSTGRES_PASSWORD}@postgres:5432/infomatt360
      REDIS_URL: redis://redis:6379/0
      API_RATE_LIMIT_BACKEND: redis
      AUTH_THROTTLE_BACKEND: redis
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/var/lib/infomatt360/uploads
    command: ["python", "-m", "app.cli.run_scheduled_tasks", "--limit", "50", "--loop", "--sleep-seconds", "60"]

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      backend-lb:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
